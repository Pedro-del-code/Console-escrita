<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console da Alma</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08050f;
    --neon: #b44fff;
    --neon2: #7f00ff;
    --neon3: #ff44ff;
    --cyan: #44ffee;
    --text: #e8d8ff;
    --text-dim: #7a5a9a;
    --card: rgba(120,0,255,0.07);
    --border: rgba(180,79,255,0.25);
    --glow: 0 0 20px rgba(180,79,255,0.4),0 0 60px rgba(180,79,255,0.15);
    --glow-sm: 0 0 10px rgba(180,79,255,0.5);
    --cyan-glow: 0 0 10px rgba(68,255,238,0.5);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden; }

  body::before {
    content:'';position:fixed;inset:0;z-index:0;
    background-image:
      linear-gradient(rgba(127,0,255,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(127,0,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
  }
  body::after {
    content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);
  }

  .blob { position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0; }
  .blob1 { width:500px;height:500px;background:rgba(127,0,255,0.15);top:-150px;left:-100px;animation:bm1 20s infinite ease-in-out alternate; }
  .blob2 { width:400px;height:400px;background:rgba(255,44,255,0.08);bottom:-100px;right:-80px;animation:bm2 25s infinite ease-in-out alternate; }
  .blob3 { width:250px;height:250px;background:rgba(68,255,238,0.05);top:40%;left:50%;animation:bm1 18s infinite ease-in-out alternate-reverse; }
  @keyframes bm1{from{transform:translate(0,0)}to{transform:translate(30px,20px)}}
  @keyframes bm2{from{transform:translate(0,0)}to{transform:translate(-20px,-15px)}}

  /* Sound gate */
  .sound-gate {
    position:fixed;inset:0;z-index:40;
    background:radial-gradient(ellipse at center,rgba(30,0,60,0.98) 0%,rgba(8,5,15,0.99) 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;text-align:center;
    opacity:1;transition:opacity .6s;
  }
  .sound-gate.hidden { opacity:0;pointer-events:none; }
  .gate-hex {
    font-size:3rem;margin-bottom:8px;
    text-shadow:0 0 40px rgba(180,79,255,0.8),0 0 80px rgba(180,79,255,0.4);
    animation:hexPulse 2s infinite ease-in-out;
  }
  @keyframes hexPulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.05);filter:brightness(1.3)}}
  .gate-title {
    font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:700;
    color:var(--neon);letter-spacing:.05em;
    text-shadow:0 0 30px rgba(180,79,255,0.8),0 0 60px rgba(180,79,255,0.4);
  }
  .gate-sub {
    font-family:'Orbitron',monospace;font-size:.5rem;font-weight:400;
    letter-spacing:.4em;text-transform:uppercase;color:var(--text-dim);
  }
  .gate-btn {
    margin-top:16px;padding:14px 40px;
    background:linear-gradient(135deg,rgba(180,79,255,0.2),rgba(127,0,255,0.35));
    border:1px solid var(--neon);border-radius:4px;
    color:var(--neon);
    font-family:'Orbitron',monospace;font-weight:600;font-size:.6rem;
    letter-spacing:.3em;text-transform:uppercase;cursor:pointer;
    transition:all .3s;text-shadow:var(--glow-sm);
    box-shadow:var(--glow);
  }
  .gate-btn:active { background:rgba(180,79,255,0.5);box-shadow:0 0 40px rgba(180,79,255,0.6); }

  /* Layout */
  .wrapper {
    position:relative;z-index:2;
    max-width:680px;margin:0 auto;
    padding:40px 20px 160px;
    min-height:100vh;display:flex;flex-direction:column;
  }

  /* Header */
  .header {
    text-align:center;margin-bottom:32px;
    opacity:0;animation:fadeUp 1s .3s forwards;
  }
  .header-tag {
    font-family:'Orbitron',monospace;font-size:.5rem;font-weight:600;
    letter-spacing:.5em;text-transform:uppercase;
    color:var(--cyan);text-shadow:var(--cyan-glow);margin-bottom:8px;
  }
  .header-title {
    font-family:'Orbitron',monospace;
    font-size:clamp(1.6rem,5vw,2.6rem);font-weight:900;
    color:var(--neon);letter-spacing:.05em;
    text-shadow:0 0 40px rgba(180,79,255,0.7),0 0 80px rgba(180,79,255,0.3);
    line-height:1.1;
  }
  .header-line {
    margin:12px auto 0;width:80px;height:1px;
    background:linear-gradient(90deg,transparent,var(--neon),transparent);
    box-shadow:0 0 10px var(--neon);
  }

  /* Now playing */
  .now-playing-card {
    display:none;
    margin-bottom:24px;
    padding:14px 16px;
    background:linear-gradient(135deg,rgba(180,79,255,0.1),rgba(68,255,238,0.05));
    border:1px solid rgba(180,79,255,0.4);
    border-radius:8px;
    box-shadow:var(--glow);
    opacity:0;transition:opacity .5s;
    align-items:center;gap:14px;
  }
  .now-playing-card.visible { display:flex;opacity:1; }
  .np-cover {
    width:60px;height:60px;border-radius:6px;object-fit:cover;flex-shrink:0;
    border:1px solid var(--neon);box-shadow:var(--glow-sm);
  }
  .np-details { flex:1;min-width:0; }
  .np-label {
    font-family:'Orbitron',monospace;font-size:.42rem;letter-spacing:.35em;
    text-transform:uppercase;color:var(--cyan);text-shadow:var(--cyan-glow);margin-bottom:4px;
  }
  .np-song { font-size:1rem;font-weight:600;color:var(--neon);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:var(--glow-sm); }
  .np-wave { display:flex;align-items:flex-end;gap:3px;height:20px;flex-shrink:0; }
  .np-bar { width:3px;background:var(--neon);border-radius:2px;box-shadow:0 0 6px var(--neon);animation:wave 1s infinite ease-in-out alternate; }
  .np-bar:nth-child(1){height:6px;animation-delay:0s;}
  .np-bar:nth-child(2){height:14px;animation-delay:.15s;}
  .np-bar:nth-child(3){height:9px;animation-delay:.3s;}
  .np-bar:nth-child(4){height:16px;animation-delay:.1s;}
  @keyframes wave{from{transform:scaleY(1)}to{transform:scaleY(1.8)}}

  /* YouTube player hidden */
  #ytPlayer { position:fixed;top:-9999px;left:-9999px;width:1px;height:1px; }

  /* Messages */
  .messages-area {
    flex:1;overflow-y:auto;padding:4px 0 20px;
    display:flex;flex-direction:column;gap:0;scroll-behavior:smooth;
  }
  .message-entry {
    opacity:0;
    animation:msgIn .5s ease forwards;
    margin-bottom:16px;
    padding:16px 18px;
    background:var(--card);
    border:1px solid var(--border);
    border-left:3px solid var(--neon);
    border-radius:6px;
    box-shadow:inset 0 0 20px rgba(180,79,255,0.03);
    transition:all .3s;
  }
  .message-entry:hover { border-color:rgba(180,79,255,0.5);box-shadow:var(--glow-sm),inset 0 0 20px rgba(180,79,255,0.05); }
  @keyframes msgIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
  .message-meta {
    font-family:'Orbitron',monospace;font-size:.42rem;
    letter-spacing:.25em;text-transform:uppercase;
    color:var(--neon);text-shadow:var(--glow-sm);margin-bottom:10px;
  }
  .message-text {
    font-family:'Rajdhani',sans-serif;
    font-size:clamp(1rem,2.5vw,1.25rem);line-height:1.8;font-weight:400;
    color:var(--text);white-space:pre-wrap;
  }
  .message-cursor {
    display:inline-block;width:2px;height:1em;
    background:var(--neon);margin-left:3px;vertical-align:middle;
    box-shadow:var(--glow-sm);animation:blink .8s infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* Typing indicator */
  .typing-indicator {
    display:none;align-items:center;gap:10px;
    padding:14px 0;opacity:0;transition:opacity .4s;
  }
  .typing-indicator.visible { display:flex;opacity:1; }
  .typing-label {
    font-family:'Orbitron',monospace;font-size:.45rem;
    letter-spacing:.3em;text-transform:uppercase;
    color:var(--neon);text-shadow:var(--glow-sm);
    animation:flicker 2s infinite;
  }
  @keyframes flicker{0%,100%{opacity:1}50%{opacity:.6}}
  .typing-dots { display:flex;gap:5px; }
  .typing-dot {
    width:6px;height:6px;border-radius:50%;
    background:var(--neon);box-shadow:var(--glow-sm);
    animation:dotBounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2){animation-delay:.2s;}
  .typing-dot:nth-child(3){animation-delay:.4s;}
  @keyframes dotBounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1.2);opacity:1}}

  /* Empty */
  .empty-state {
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;padding:60px 0;
    opacity:0;animation:fadeUp 1.4s .8s forwards;
  }
  .empty-hex { font-size:3rem;margin-bottom:16px;opacity:.3;filter:drop-shadow(0 0 20px var(--neon)); }
  .empty-text {
    font-family:'Orbitron',monospace;font-size:.55rem;
    letter-spacing:.3em;text-transform:uppercase;
    color:var(--text-dim);line-height:2;
  }

  /* Reply FAB */
  .reply-fab {
    position:fixed;bottom:32px;right:20px;z-index:15;
    width:54px;height:54px;border-radius:50%;
    border:1px solid var(--neon);
    background:rgba(8,5,15,0.9);backdrop-filter:blur(20px);
    color:var(--neon);font-size:1.2rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--glow);transition:all .3s;
  }
  .reply-fab:active { transform:scale(.94);box-shadow:0 0 40px rgba(180,79,255,0.7); }

  /* Reply modal */
  .reply-overlay {
    position:fixed;inset:0;z-index:25;
    background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  .reply-overlay.open { opacity:1;pointer-events:all; }
  .reply-modal {
    position:fixed;bottom:0;left:0;right:0;z-index:26;
    background:rgba(10,6,18,0.98);
    border-top:1px solid var(--neon);
    box-shadow:0 -10px 60px rgba(180,79,255,0.3);
    padding:20px;padding-bottom:max(28px,env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);
    max-width:680px;margin:0 auto;
  }
  .reply-modal.open { transform:translateY(0); }
  .reply-modal-label {
    font-family:'Orbitron',monospace;font-size:.45rem;font-weight:600;
    letter-spacing:.3em;text-transform:uppercase;
    color:var(--cyan);text-shadow:var(--cyan-glow);margin-bottom:12px;
  }
  .reply-textarea {
    width:100%;min-height:80px;max-height:140px;
    background:rgba(68,255,238,0.04);
    border:1px solid rgba(68,255,238,0.25);
    border-radius:4px;padding:12px 14px;
    color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:400;line-height:1.6;
    resize:none;outline:none;transition:all .3s;-webkit-appearance:none;
  }
  .reply-textarea:focus { border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),inset 0 0 20px rgba(68,255,238,0.04); }
  .reply-textarea::placeholder { color:var(--text-dim);font-style:italic; }
  .reply-row { display:flex;gap:10px;margin-top:10px; }
  .reply-cancel {
    padding:12px 16px;background:transparent;
    border:1px solid var(--border);border-radius:4px;
    color:var(--text-dim);font-family:'Orbitron',monospace;
    font-size:.45rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;
  }
  .reply-send {
    flex:1;padding:12px;background:linear-gradient(135deg,rgba(68,255,238,0.1),rgba(68,255,238,0.2));
    border:1px solid var(--cyan);border-radius:4px;
    color:var(--cyan);font-family:'Orbitron',monospace;
    font-size:.5rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;
    cursor:pointer;transition:all .3s;text-shadow:var(--cyan-glow);
  }
  .reply-send:active { background:rgba(68,255,238,0.25);box-shadow:0 0 20px rgba(68,255,238,0.4); }
  .reply-send.sending { opacity:.4;pointer-events:none; }

  /* Toast */
  .music-toast {
    position:fixed;bottom:100px;left:50%;
    transform:translateX(-50%) translateY(20px);
    padding:8px 20px;
    background:rgba(8,5,15,0.95);
    border:1px solid var(--neon);border-radius:4px;
    font-family:'Orbitron',monospace;font-size:.45rem;
    letter-spacing:.2em;color:var(--neon);text-shadow:var(--glow-sm);
    opacity:0;transition:all .4s ease;pointer-events:none;z-index:20;
    white-space:nowrap;backdrop-filter:blur(20px);box-shadow:var(--glow);
  }
  .music-toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  @media(max-width:768px){
    .wrapper{padding:32px 16px 150px;}
    .message-entry{padding:12px 14px;margin-bottom:12px;}
    .message-text{font-size:1rem;}
  }

  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(180,79,255,0.3);border-radius:2px}
</style>
</head>
<body>

<!-- Sound gate -->
<div class="sound-gate" id="soundGate">
  <div class="gate-hex">⬡</div>
  <div class="gate-title">Console da Alma</div>
  <div class="gate-sub">mensagens ao vivo</div>
  <button class="gate-btn" onclick="activateSound()">▶ iniciar</button>
</div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div id="ytPlayer"></div>

<div class="wrapper">
  <div class="header">
    <div class="header-tag">// transmissão ao vivo</div>
    <div class="header-title">Console da Alma</div>
    <div class="header-line"></div>
  </div>

  <div class="now-playing-card" id="nowPlayingCard">
    <img class="np-cover" id="npCover" src="" alt="">
    <div class="np-details">
      <div class="np-label">▶ tocando agora</div>
      <div class="np-song" id="npSong"></div>
    </div>
    <div class="np-wave">
      <div class="np-bar"></div>
      <div class="np-bar"></div>
      <div class="np-bar"></div>
      <div class="np-bar"></div>
    </div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-hex">⬡</div>
      <div class="empty-text">aguardando transmissão...</div>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dots">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
    <div class="typing-label">transmitindo...</div>
  </div>
</div>

<button class="reply-fab" onclick="openReply()">✍</button>

<div class="reply-overlay" id="replyOverlay" onclick="closeReply()"></div>
<div class="reply-modal" id="replyModal">
  <div class="reply-modal-label">◈ sua resposta</div>
  <textarea class="reply-textarea" id="replyInput" placeholder="escreva sua resposta..." maxlength="1000"></textarea>
  <div class="reply-row">
    <button class="reply-cancel" onclick="closeReply()">cancelar</button>
    <button class="reply-send" id="replySendBtn" onclick="sendReply()">▶ transmitir</button>
  </div>
</div>

<div class="music-toast" id="musicToast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, onChildAdded, onChildRemoved, query, orderByChild, remove, get, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPJumCm22O2efBsou0_HjMb2F8mk9ndUE",
    authDomain: "soul-23fc2.firebaseapp.com",
    databaseURL: "https://soul-23fc2-default-rtdb.firebaseio.com",
    projectId: "soul-23fc2",
    storageBucket: "soul-23fc2.firebasestorage.app",
    messagingSenderId: "385202397060",
    appId: "1:385202397060:web:8faf55d3b6fdf74e23c7d1"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const messagesArea    = document.getElementById("messagesArea");
  const emptyState      = document.getElementById("emptyState");
  const typingIndicator = document.getElementById("typingIndicator");

  let messageCount = 0;
  let isFirstLoad  = true;
  const renderedIds = new Set();

  onValue(ref(db,"typing"), snap => {
    const val = snap.val();
    typingIndicator.classList.toggle("visible", !!(val&&val.active));
  });

  window._ytPlayer = null;
  window._soundUnlocked = false;
  window._pendingVideo = null;

  window.__applyMusic = function(data) {
    if (!window._soundUnlocked) { window._pendingVideo = data; return; }
    if (!data || !data.videoId) {
      if (window._ytPlayer) { try { window._ytPlayer.stopVideo(); } catch(e){} }
      document.getElementById("nowPlayingCard").classList.remove("visible");
      return;
    }
    document.getElementById("npCover").src = data.thumb||"";
    document.getElementById("npSong").textContent = data.title||"";
    document.getElementById("nowPlayingCard").classList.add("visible");
    showMusicToast("♪ " + (data.title||"música"));
    if (window._ytPlayer && window._ytPlayer.loadVideoById) {
      window._ytPlayer.loadVideoById(data.videoId);
    } else {
      window._pendingVideo = data;
    }
  };

  onValue(ref(db,"musicaAtual"), snap => {
    window.__applyMusic(snap.val());
  });

  const msgsRef = query(ref(db,"messages"), orderByChild("timestamp"));
  onChildAdded(msgsRef, snap => {
    const id=snap.key; const msg=snap.val();
    if (renderedIds.has(id)) return;
    renderedIds.add(id);
    renderMessage(msg, id, !isFirstLoad);
    get(ref(db,"messages")).then(snapshot => {
      if (!snapshot.exists()) return;
      const all=[];
      snapshot.forEach(c=>all.push({key:c.key,ts:c.val().timestamp}));
      if (all.length>3) {
        all.sort((a,b)=>a.ts-b.ts);
        remove(ref(db,"messages/"+all[0].key));
      }
    });
  });

  onChildRemoved(ref(db,"messages"), snap => {
    const el = messagesArea.querySelector(`[data-id="${snap.key}"]`);
    if (el) { el.style.opacity="0"; el.style.transform="translateX(12px)"; el.style.transition="all .4s"; setTimeout(()=>el.remove(),400); }
    renderedIds.delete(snap.key);
  });

  setTimeout(()=>{ isFirstLoad=false; },1500);

  function renderMessage(msg, id, animate) {
    if (emptyState.parentNode) {
      emptyState.style.opacity="0"; emptyState.style.transition="opacity .5s";
      setTimeout(()=>emptyState.remove(),500);
    }
    messageCount++;
    const timeStr = new Date(msg.timestamp).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    const entry = document.createElement("div");
    entry.className="message-entry"; entry.dataset.id=id;
    if (!animate) entry.style.animationDelay=`${(messageCount-1)*.12}s`;
    const meta=document.createElement("div"); meta.className="message-meta"; meta.textContent=`// ${timeStr}`;
    const textEl=document.createElement("div"); textEl.className="message-text";
    entry.appendChild(meta); entry.appendChild(textEl);
    messagesArea.appendChild(entry);
    if (animate) typewriterEffect(textEl, msg.text);
    else textEl.textContent=msg.text;
    setTimeout(()=>entry.scrollIntoView({behavior:"smooth",block:"end"}),100);
  }

  function typewriterEffect(el, text) {
    const cursor=document.createElement("span"); cursor.className="message-cursor"; el.appendChild(cursor);
    let i=0; const speed=Math.max(18,Math.min(40,2000/text.length));
    const interval=setInterval(()=>{
      if (i<text.length) { el.insertBefore(document.createTextNode(text[i]),cursor); i++; el.closest(".message-entry").scrollIntoView({behavior:"smooth",block:"end"}); }
      else { clearInterval(interval); cursor.remove(); }
    },speed);
  }

  window.sendReply = async function() {
    const text = document.getElementById("replyInput").value.trim();
    if (!text) return;
    const btn = document.getElementById("replySendBtn");
    btn.classList.add("sending");
    try {
      await push(ref(db,"replies"), { text, timestamp: Date.now() });
      document.getElementById("replyInput").value="";
      closeReply();
      showMusicToast("▶ resposta enviada");
    } catch(e) { showMusicToast("⚠ erro ao enviar"); }
    btn.classList.remove("sending");
  };
</script>

<script>
  window.activateSound = function() {
    const gate = document.getElementById("soundGate");
    gate.classList.add("hidden");
    setTimeout(()=>{ gate.style.display="none"; },600);
    window._soundUnlocked = true;
    if (window._pendingVideo) {
      window.__applyMusic(window._pendingVideo);
      window._pendingVideo = null;
    }
  };

  window.onYouTubeIframeAPIReady = function() {
    window._ytPlayer = new YT.Player("ytPlayer", {
      height:"1",width:"1",
      playerVars:{ autoplay:1,controls:0 },
      events:{
        onReady: function() {
          if (window._pendingVideo && window._soundUnlocked) {
            window._ytPlayer.loadVideoById(window._pendingVideo.videoId);
            window._pendingVideo = null;
          }
        }
      }
    });
  };

  const tag=document.createElement("script");
  tag.src="https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  window.openReply = function() {
    document.getElementById("replyOverlay").classList.add("open");
    document.getElementById("replyModal").classList.add("open");
    setTimeout(()=>document.getElementById("replyInput").focus(),350);
  };
  window.closeReply = function() {
    document.getElementById("replyOverlay").classList.remove("open");
    document.getElementById("replyModal").classList.remove("open");
  };

  function showMusicToast(msg) {
    const el=document.getElementById("musicToast");
    el.textContent=msg; el.classList.add("show");
    setTimeout(()=>el.classList.remove("show"),2800);
  }
  window.showMusicToast = showMusicToast;
</script>
</body>
</html>
