<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console da Alma</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d14;--surface:#12121e;--glow:#c8a0e4;--text:#e8dff5;--text-dim:#7a6f90;--accent:#9b6dbd;--pulse:#d4b0f0;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden;}

  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) infinite ease-in-out alternate;}
  @keyframes twinkle{from{opacity:var(--o1,.1);transform:scale(1)}to{opacity:var(--o2,.6);transform:scale(1.3)}}
  .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:.18;}
  .orb1{width:500px;height:500px;background:#6a3fa0;top:-100px;left:-100px;animation:drift1 18s infinite ease-in-out alternate;}
  .orb2{width:400px;height:400px;background:#3f3560;bottom:-80px;right:-80px;animation:drift2 22s infinite ease-in-out alternate;}
  .orb3{width:300px;height:300px;background:#7050a0;top:40%;left:40%;animation:drift1 15s infinite ease-in-out alternate-reverse;}
  @keyframes drift1{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.15)}}
  @keyframes drift2{from{transform:translate(0,0) scale(1)}to{transform:translate(-30px,-20px) scale(1.1)}}

  .wrapper{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:50px 28px 140px;min-height:100vh;display:flex;flex-direction:column;}

  /* Header */
  .header{text-align:center;margin-bottom:40px;opacity:0;animation:fadeUp 1.2s .3s forwards;}
  .header-eyebrow{font-family:'Raleway',sans-serif;font-weight:200;font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
  .header-title{font-size:clamp(1.8rem,5vw,3rem);font-weight:300;font-style:italic;color:var(--pulse);letter-spacing:.02em;text-shadow:0 0 40px rgba(200,160,228,.4);}
  .divider{margin:16px auto 0;width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}

  /* Now playing card */
  .now-playing-card{
    display:none;align-items:center;gap:14px;
    padding:14px 18px;margin-bottom:28px;
    background:rgba(155,109,189,.07);
    border:1px solid rgba(155,109,189,.2);
    border-radius:10px;
    opacity:0;transition:opacity .5s;
  }
  .now-playing-card.visible{display:flex;opacity:1;}
  .np-cover{width:56px;height:56px;border-radius:6px;object-fit:cover;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.4);}
  .np-details{flex:1;min-width:0;}
  .np-label{font-family:'Raleway',sans-serif;font-weight:200;font-size:.52rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
  .np-song{font-size:1rem;font-weight:300;color:var(--pulse);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .np-wave{display:flex;align-items:flex-end;gap:3px;height:18px;flex-shrink:0;}
  .np-bar{width:3px;background:var(--accent);border-radius:2px;animation:wave 1s infinite ease-in-out alternate;}
  .np-bar:nth-child(1){height:6px;animation-delay:0s;}
  .np-bar:nth-child(2){height:14px;animation-delay:.2s;}
  .np-bar:nth-child(3){height:9px;animation-delay:.4s;}
  .np-bar:nth-child(4){height:16px;animation-delay:.1s;}
  @keyframes wave{from{transform:scaleY(1)}to{transform:scaleY(1.8)}}

  /* YouTube player (hidden) */
  #ytPlayer{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;}

  /* Messages */
  .messages-area{flex:1;overflow-y:auto;padding:4px 0 20px;display:flex;flex-direction:column;gap:0;scroll-behavior:smooth;}
  .message-entry{opacity:0;transform:translateY(20px);animation:fadeIn .5s ease forwards;margin-bottom:18px;padding:16px 20px;background:rgba(255,255,255,.04);border-left:3px solid #9b87f5;border-radius:8px;transition:background .3s;}
  .message-entry:hover{background:rgba(255,255,255,.06);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .message-meta{font-family:'Raleway',sans-serif;font-weight:200;font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
  .message-text{font-size:clamp(1rem,2.5vw,1.3rem);line-height:1.85;font-weight:300;color:var(--text);white-space:pre-wrap;}
  .message-cursor{display:inline-block;width:2px;height:1.1em;background:var(--pulse);margin-left:3px;vertical-align:middle;animation:blink .9s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* Typing */
  .typing-indicator{display:none;align-items:center;gap:10px;padding:16px 0;opacity:0;transition:opacity .4s;}
  .typing-indicator.visible{display:flex;opacity:1;}
  .typing-label{font-family:'Raleway',sans-serif;font-weight:200;font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);font-style:italic;}
  .typing-dots{display:flex;gap:5px;}
  .typing-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:dotBounce 1.2s infinite ease-in-out;}
  .typing-dot:nth-child(2){animation-delay:.2s;}
  .typing-dot:nth-child(3){animation-delay:.4s;}
  @keyframes dotBounce{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}

  /* Empty */
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 0;opacity:0;animation:fadeUp 1.4s .8s forwards;}
  .empty-icon{font-size:2.5rem;margin-bottom:20px;opacity:.3;}
  .empty-text{font-size:1.1rem;font-style:italic;font-weight:300;color:var(--text-dim);line-height:1.7;max-width:320px;}

  /* Sound gate */
  .sound-gate{position:fixed;inset:0;z-index:30;background:rgba(13,13,20,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;opacity:1;transition:opacity .5s;}
  .sound-gate.hidden{opacity:0;pointer-events:none;}
  .sound-gate-title{font-size:1.6rem;font-weight:300;font-style:italic;color:var(--pulse);text-shadow:0 0 30px rgba(200,160,228,.3);}
  .sound-gate-sub{font-family:'Raleway',sans-serif;font-weight:200;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim);}
  .sound-gate-btn{margin-top:12px;padding:14px 36px;background:transparent;border:1px solid rgba(155,109,189,.4);border-radius:2px;color:var(--pulse);font-family:'Raleway',sans-serif;font-weight:300;font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;cursor:pointer;transition:all .3s;}
  .sound-gate-btn:active{background:rgba(155,109,189,.12);}

  /* Reply button */
  .reply-fab{
    position:fixed;bottom:32px;right:24px;z-index:15;
    width:52px;height:52px;border-radius:50%;
    border:1px solid rgba(212,176,240,.4);
    background:rgba(18,18,30,.9);backdrop-filter:blur(12px);
    color:var(--pulse);font-size:1.3rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 24px rgba(155,109,189,.2);
    transition:all .3s;
  }
  .reply-fab:active{transform:scale(.95);}

  /* Reply modal */
  .reply-overlay{position:fixed;inset:0;z-index:25;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s;}
  .reply-overlay.open{opacity:1;pointer-events:all;}
  .reply-modal{
    position:fixed;bottom:0;left:0;right:0;z-index:26;
    background:rgba(13,13,20,.98);border-top:1px solid rgba(155,109,189,.2);
    padding:20px 24px;padding-bottom:max(28px,env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);
    max-width:680px;margin:0 auto;
  }
  .reply-modal.open{transform:translateY(0);}
  .reply-modal-label{font-family:'Raleway',sans-serif;font-weight:200;font-size:.58rem;letter-spacing:.35em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;}
  .reply-textarea{width:100%;min-height:80px;max-height:140px;background:rgba(212,176,240,.06);border:1px solid rgba(212,176,240,.2);border-radius:2px;padding:12px 14px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;line-height:1.7;resize:none;outline:none;transition:border-color .3s;-webkit-appearance:none;}
  .reply-textarea:focus{border-color:rgba(212,176,240,.4);}
  .reply-textarea::placeholder{color:var(--text-dim);font-style:italic;}
  .reply-row{display:flex;gap:10px;margin-top:10px;}
  .reply-cancel{padding:12px 16px;background:transparent;border:1px solid rgba(155,109,189,.2);border-radius:2px;color:var(--text-dim);font-family:'Raleway',sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;}
  .reply-send{flex:1;padding:12px;background:transparent;border:1px solid rgba(212,176,240,.35);border-radius:2px;color:var(--pulse);font-family:'Raleway',sans-serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:all .3s;}
  .reply-send:active{background:rgba(212,176,240,.1);}
  .reply-send.sending{opacity:.4;pointer-events:none;}

  /* Music toast */
  .music-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);padding:8px 18px;background:rgba(18,18,30,.92);border:1px solid rgba(155,109,189,.25);border-radius:20px;font-family:'Raleway',sans-serif;font-size:.62rem;letter-spacing:.2em;color:var(--text-dim);opacity:0;transition:all .4s ease;pointer-events:none;z-index:20;white-space:nowrap;backdrop-filter:blur(12px);}
  .music-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:768px){.wrapper{padding:36px 18px 140px;}.message-entry{padding:12px 14px;margin-bottom:14px;}.message-text{font-size:1rem;}}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(155,109,189,.3);border-radius:2px}
</style>
</head>
<body>

<!-- Sound gate -->
<div class="sound-gate" id="soundGate">
  <div class="sound-gate-title">Console da Alma</div>
  <div class="sound-gate-sub">mensagens ao vivo</div>
  <button class="sound-gate-btn" onclick="activateSound()">✦ entrar</button>
</div>

<div class="stars" id="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- YouTube iframe player (hidden) -->
<div id="ytPlayer"></div>

<div class="wrapper">
  <div class="header">
    <div class="header-eyebrow">mensagens ao vivo</div>
    <div class="header-title">Console da Alma</div>
    <div class="divider"></div>
  </div>

  <!-- Now playing -->
  <div class="now-playing-card" id="nowPlayingCard">
    <img class="np-cover" id="npCover" src="" alt="">
    <div class="np-details">
      <div class="np-label">tocando agora</div>
      <div class="np-song" id="npSong"></div>
    </div>
    <div class="np-wave">
      <div class="np-bar"></div>
      <div class="np-bar"></div>
      <div class="np-bar"></div>
      <div class="np-bar"></div>
    </div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <div class="empty-text">aguardando as primeiras palavras chegarem...</div>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dots">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
    <div class="typing-label">algo está sendo escrito</div>
  </div>
</div>

<!-- Reply FAB -->
<button class="reply-fab" onclick="openReply()">✍</button>

<!-- Reply modal -->
<div class="reply-overlay" id="replyOverlay" onclick="closeReply()"></div>
<div class="reply-modal" id="replyModal">
  <div class="reply-modal-label">sua resposta</div>
  <textarea class="reply-textarea" id="replyInput" placeholder="escreva sua resposta..." maxlength="1000"></textarea>
  <div class="reply-row">
    <button class="reply-cancel" onclick="closeReply()">cancelar</button>
    <button class="reply-send" id="replySendBtn" onclick="sendReply()">✦ enviar</button>
  </div>
</div>

<div class="music-toast" id="musicToast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, onChildAdded, onChildRemoved, query, orderByChild, remove, get, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPJumCm22O2efBsou0_HjMb2F8mk9ndUE",
    authDomain: "soul-23fc2.firebaseapp.com",
    databaseURL: "https://soul-23fc2-default-rtdb.firebaseio.com",
    projectId: "soul-23fc2",
    storageBucket: "soul-23fc2.firebasestorage.app",
    messagingSenderId: "385202397060",
    appId: "1:385202397060:web:8faf55d3b6fdf74e23c7d1"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const messagesArea    = document.getElementById("messagesArea");
  const emptyState      = document.getElementById("emptyState");
  const typingIndicator = document.getElementById("typingIndicator");

  let messageCount = 0;
  let isFirstLoad  = true;
  const renderedIds = new Set();

  // Typing
  onValue(ref(db,"typing"), snap => {
    const val = snap.val();
    typingIndicator.classList.toggle("visible", !!(val&&val.active));
  });

  // Music
  window._ytPlayer = null;
  window._soundUnlocked = false;
  window._pendingVideo = null;

  window.__applyMusic = function(data) {
    if (!window._soundUnlocked) { window._pendingVideo = data; return; }
    if (!data || !data.videoId) {
      if (window._ytPlayer) { try { window._ytPlayer.stopVideo(); } catch(e){} }
      document.getElementById("nowPlayingCard").classList.remove("visible");
      return;
    }
    document.getElementById("npCover").src = data.thumb||"";
    document.getElementById("npSong").textContent = data.title||"";
    document.getElementById("nowPlayingCard").classList.add("visible");
    showMusicToast("🎵 " + (data.title||"música"));
    if (window._ytPlayer && window._ytPlayer.loadVideoById) {
      window._ytPlayer.loadVideoById(data.videoId);
    } else {
      window._pendingVideo = data;
    }
  };

  onValue(ref(db,"musicaAtual"), snap => {
    const val = snap.val();
    window.__applyMusic(val);
  });

  // Messages
  const msgsRef = query(ref(db,"messages"), orderByChild("timestamp"));
  onChildAdded(msgsRef, snap => {
    const id=snap.key; const msg=snap.val();
    if (renderedIds.has(id)) return;
    renderedIds.add(id);
    renderMessage(msg, id, !isFirstLoad);
    // Auto-delete oldest if >3
    get(ref(db,"messages")).then(snapshot => {
      if (!snapshot.exists()) return;
      const all=[];
      snapshot.forEach(c=>all.push({key:c.key,ts:c.val().timestamp}));
      if (all.length>3) {
        all.sort((a,b)=>a.ts-b.ts);
        remove(ref(db,"messages/"+all[0].key));
      }
    });
  });

  onChildRemoved(ref(db,"messages"), snap => {
    const el = messagesArea.querySelector(`[data-id="${snap.key}"]`);
    if (el) { el.style.opacity="0"; el.style.transition="opacity .4s"; setTimeout(()=>el.remove(),400); }
    renderedIds.delete(snap.key);
  });

  setTimeout(()=>{ isFirstLoad=false; },1500);

  function renderMessage(msg, id, animate) {
    if (emptyState.parentNode) {
      emptyState.style.opacity="0"; emptyState.style.transition="opacity .5s";
      setTimeout(()=>emptyState.remove(),500);
    }
    messageCount++;
    const timeStr = new Date(msg.timestamp).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    const entry = document.createElement("div");
    entry.className="message-entry"; entry.dataset.id=id;
    if (!animate) entry.style.animationDelay=`${(messageCount-1)*.12}s`;
    const meta=document.createElement("div"); meta.className="message-meta"; meta.textContent=timeStr;
    const textEl=document.createElement("div"); textEl.className="message-text";
    entry.appendChild(meta); entry.appendChild(textEl);
    messagesArea.appendChild(entry);
    if (animate) typewriterEffect(textEl, msg.text);
    else textEl.textContent=msg.text;
    setTimeout(()=>entry.scrollIntoView({behavior:"smooth",block:"end"}),100);
  }

  function typewriterEffect(el, text) {
    const cursor=document.createElement("span"); cursor.className="message-cursor"; el.appendChild(cursor);
    let i=0; const speed=Math.max(18,Math.min(40,2000/text.length));
    const interval=setInterval(()=>{
      if (i<text.length) { el.insertBefore(document.createTextNode(text[i]),cursor); i++; el.closest(".message-entry").scrollIntoView({behavior:"smooth",block:"end"}); }
      else { clearInterval(interval); cursor.remove(); }
    },speed);
  }

  // Reply
  window.sendReply = async function() {
    const text = document.getElementById("replyInput").value.trim();
    if (!text) return;
    const btn = document.getElementById("replySendBtn");
    btn.classList.add("sending");
    try {
      await push(ref(db,"replies"), { text, timestamp: Date.now() });
      document.getElementById("replyInput").value="";
      closeReply();
      showMusicToast("✦ resposta enviada");
    } catch(e) { showMusicToast("erro ao enviar"); }
    btn.classList.remove("sending");
  };
</script>

<script>
  // Stars
  const starsEl=document.getElementById("stars");
  for(let i=0;i<90;i++){
    const s=document.createElement("div"); s.className="star";
    const sz=Math.random()*2+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*5}s;--o1:${.05+Math.random()*.2};--o2:${.3+Math.random()*.5};animation-delay:${Math.random()*6}s;`;
    starsEl.appendChild(s);
  }

  // Sound gate
  window.activateSound = function() {
    const gate=document.getElementById("soundGate");
    gate.classList.add("hidden");
    setTimeout(()=>{ gate.style.display="none"; },500);
    window._soundUnlocked = true;
    if (window._pendingVideo) {
      window.__applyMusic(window._pendingVideo);
      window._pendingVideo = null;
    }
  };

  // YouTube IFrame API
  window.onYouTubeIframeAPIReady = function() {
    window._ytPlayer = new YT.Player("ytPlayer", {
      height:"1", width:"1",
      playerVars:{ autoplay:1, controls:0 },
      events:{
        onReady: function() {
          if (window._pendingVideo && window._soundUnlocked) {
            window._ytPlayer.loadVideoById(window._pendingVideo.videoId);
            window._pendingVideo = null;
          }
        }
      }
    });
  };

  // Load YouTube API
  const tag=document.createElement("script");
  tag.src="https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  // Reply modal
  window.openReply = function() {
    document.getElementById("replyOverlay").classList.add("open");
    document.getElementById("replyModal").classList.add("open");
    setTimeout(()=>document.getElementById("replyInput").focus(),350);
  };
  window.closeReply = function() {
    document.getElementById("replyOverlay").classList.remove("open");
    document.getElementById("replyModal").classList.remove("open");
  };

  // Music toast
  function showMusicToast(msg) {
    const el=document.getElementById("musicToast");
    el.textContent=msg; el.classList.add("show");
    setTimeout(()=>el.classList.remove("show"),2800);
  }
  window.showMusicToast = showMusicToast;
</script>
</body>
</html>
